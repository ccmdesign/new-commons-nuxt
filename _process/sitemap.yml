# The Incubator (Formerly the Prize)

## section: hero
  brow: BUILDING A SHARED DIGITAL FUTURE
  title: The New Commons Incubator
  body: |
    The Incubator is a global effort led by the Open Data Policy Lab that aims to unlock data commons for public-interest AI.

    The Incubator addresses a critical issue: the limited access to diverse and high-quality datasets, which is essential for AI to reach its full potential. By creating and improving data commons, which are collaboratively governed data ecosystems that pool and provide responsible access to diverse, high-quality datasets, the gap in AI development can be filled.

    Through structured programming, the Incubator will develop a pipeline of trusted, community-governed data commons that enable responsible AI development while safeguarding data rights, context, and community agency.

## section: call-for-proposals
  title: "Call for Proposals: Data Commons for Indigenous Languages and Cultures"
  tagline: The Open Data Policy Lab invites changemakers around the world to join us in developing data commons for Indigenous languages and cultural preservation in the AI era.
  cta: Apply Now

## section: webinars
  title: Join Our Informational Webinars
  tagline: Interested in applying for the Incubator? Join one of our informational webinars for more information about the application process and an open Q&A.
  cta: Sign Up

## section: why
  title: Why the Incubator?
  body: |
    AI models need access to diverse, high-quality datasets so they do not reinforce bias, deepen inequality, and return less accurate, more imprecise results. Yet, access to data remains fragmented and siloed.

    Data commons offer a solution by providing the critical infrastructure needed for responsible AI development. They pool diverse, high quality datasets from multiple sectors that are then managed through participatory governance.

    The Incubator will help transform concepts into viable, sustainable models. It will support data commons proposals by delivering training, mentorship, and direct connections with funders.

## section: programmatic-offerings
  title: Programmatic Offerings
  tagline: The Incubator is a structured program designed to support data leaders in setting up a data commons. It will include an in-person kickoff event to set the stage as well as virtual programming and mentorship, and a final showcase.
  items:
    - Design and implement accountable and context-specific data governance frameworks
    - Build AI-ready datasets grounded in community consent and social license
    - Access technical infrastructure and expertise
    - Connect with sustainable funding pathways
  cta: View Sample Program

