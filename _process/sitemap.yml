# The New Commons Challenge (Formerly the Winners)

note: The text on the first panel should be updated. All other content remains the same.

## section: hero
  brow: The 2025
  title: New Commons Challenge
  body: |
    The New Commons Challenge was a global initiative led by Microsoft and the Open Data Policy Lab, in partnership with DirectRelief, the Harvard Institutional Data Initiative, and UNESCO (international observer).

    The Challenge sought to support universities, libraries, civil society, and technologists to build data ecosystems that fuel public-interest AI. It focused on supporting new and existing data commons across two critical domains: localized decision-making and humanitarian response.

    On September 25, 2025, the Challenge awarded two $100,000 prizes. The first of these awards went to the Malawi Voice Data Commons Project -- developed by the New York University Peace Research and Education Program and Ushahidi -- for the development of a data commons. The second award went to the Amazon Rainforest Evolution Index, developed by CERTI Amazonia, for the enhancement of an existing data commons.

    The award ceremony took place as part of the broader 80th UN General Assembly events and was an affiliate session of the Digital@UNGA program.

    Information on each grantee and special distinction can be found below. For each grantee, we provide a brief description of their projects taken from their proposals and then information about how they can be contacted, should you be interested in learning more about their work or offering support.

    We thank our partners DirectRelief and the Harvard Institutional Data Initiative, as well as our observer UNESCO, for their support.

    note: The list of awardees and distinctions on the right side of the panel remains the same

