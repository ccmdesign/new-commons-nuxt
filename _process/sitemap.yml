# New Commons for Indigenous Languages and Cultures (new page)

## section: hero
  brow: New Commons Incubator
  title: Indigenous Languages and Cultures
  tagline: A structured program for developing data commons for Indigenous languages and cultures
  cta: Apply Now

## section: why
  title: Why?
  body: |
    Indigenous languages face many pressures in the age of AI:
    - When left out, existing digital marginalization and inequities deepen.
    - When included, data is often extracted without consent or benefit.
    - And even well-intentioned efforts frequently strip away the cultural context that gives these languages meaning.

    This represents both a technical and governance breakdown. What's needed is a new institutional approach.

    The New Commons Incubator for Indigenous Languages and Cultures advances a data commons model that enables responsible access to high-quality data while ensuring any access and use remains aligned with Indigenous values and expectations. It shifts the framework from extraction by outside parties to collective stewardship led by Indigenous communities themselves, ensuring that data is governed, shared, and used on community-defined terms.

## section: programmatic-offerings
  title: Programmatic Offerings
  tagline: Through a X week program, we will support selected initiatives in transforming their concepts into operational models. It will include an in-person kickoff event to set stage, virtual programming and mentorship, and a final showcase where participants will present their data commons to funders.
  items:
    - Design governance frameworks grounded in Indigenous data sovereignty and social license
    - Build AI-ready datasets rooted in consent, context, and community priorities
    - Access technical infrastructure and expertise
    - Connect to funding and global ecosystems
  partners: The GovLab (Open Data Policy Lab), Microsoft, UNESCO
  alignment: International Decade of Indigenous Languages (IDIL)
  cta: View Sample Program

